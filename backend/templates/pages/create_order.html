{% extends "base.html" %}
{% block title %}Tạo đơn mới - Quản lý Vận đơn{% endblock %}
{% block page_title %}➕ Tạo đơn mới{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <!-- Keyboard shortcuts hint -->
    <div class="bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 mb-4 flex items-center gap-4 text-xs text-gray-500">
        <span class="font-medium text-gray-600">⌨️ Phím tắt:</span>
        <span><kbd class="px-1.5 py-0.5 bg-white border border-gray-300 rounded text-[10px] font-mono shadow-sm">Ctrl</kbd> + <kbd class="px-1.5 py-0.5 bg-white border border-gray-300 rounded text-[10px] font-mono shadow-sm">S</kbd> Lưu đơn</span>
        <span><kbd class="px-1.5 py-0.5 bg-white border border-gray-300 rounded text-[10px] font-mono shadow-sm">Ctrl</kbd> + <kbd class="px-1.5 py-0.5 bg-white border border-gray-300 rounded text-[10px] font-mono shadow-sm">Shift</kbd> + <kbd class="px-1.5 py-0.5 bg-white border border-gray-300 rounded text-[10px] font-mono shadow-sm">N</kbd> Tạo mới</span>
        <span><kbd class="px-1.5 py-0.5 bg-white border border-gray-300 rounded text-[10px] font-mono shadow-sm">Esc</kbd> Xóa form</span>
    </div>

    <form id="order-form" hx-post="/api/create-order" hx-target="#form-result" hx-swap="innerHTML"
        class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-5"
        hx-on::after-request="if(event.detail.successful) { document.getElementById('order-form').reset(); document.getElementById('customer-history').innerHTML = ''; initDate(); }">

        <!-- Sheet type -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Loại đơn</label>
            <div class="flex gap-3">
                <label class="flex-1 flex items-center gap-2 p-3 border-2 border-primary-500 rounded-lg bg-primary-50 cursor-pointer sheet-radio">
                    <input type="radio" name="sheet_type" value="DON" checked class="text-primary-600">
                    <div>
                        <div class="font-medium text-primary-700">DON</div>
                        <div class="text-xs text-primary-500">Tiểu ngạch</div>
                    </div>
                </label>
                <label class="flex-1 flex items-center gap-2 p-3 border-2 border-gray-200 rounded-lg hover:border-purple-300 cursor-pointer sheet-radio">
                    <input type="radio" name="sheet_type" value="Don2" class="text-purple-600">
                    <div>
                        <div class="font-medium text-gray-700">Don2</div>
                        <div class="text-xs text-gray-500">TMDT</div>
                    </div>
                </label>
            </div>
        </div>

        <!-- Date with calendar picker -->
        <div class="relative">
            <label class="block text-sm font-medium text-gray-700 mb-1">Ngày</label>
            <div class="relative">
                <input type="text" name="order_date" id="order_date" readonly
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 cursor-pointer bg-white"
                    onclick="toggleCalendar()" value="">
                <svg class="absolute right-3 top-2.5 w-5 h-5 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
            </div>
            <div id="calendar-popup" class="absolute z-50 mt-1 bg-white border border-gray-200 rounded-xl shadow-lg p-3 hidden" style="min-width: 280px;">
                <div class="flex items-center justify-between mb-2">
                    <button type="button" onclick="calNav(-1)" class="p-1 hover:bg-gray-100 rounded">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <span id="cal-title" class="text-sm font-semibold text-gray-800"></span>
                    <button type="button" onclick="calNav(1)" class="p-1 hover:bg-gray-100 rounded">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
                <div class="grid grid-cols-7 gap-0.5 text-center">
                    <div class="text-[10px] font-medium text-gray-400 py-1">CN</div>
                    <div class="text-[10px] font-medium text-gray-400 py-1">T2</div>
                    <div class="text-[10px] font-medium text-gray-400 py-1">T3</div>
                    <div class="text-[10px] font-medium text-gray-400 py-1">T4</div>
                    <div class="text-[10px] font-medium text-gray-400 py-1">T5</div>
                    <div class="text-[10px] font-medium text-gray-400 py-1">T6</div>
                    <div class="text-[10px] font-medium text-gray-400 py-1">T7</div>
                </div>
                <div id="cal-grid" class="grid grid-cols-7 gap-0.5 text-center"></div>
                <div class="mt-2 pt-2 border-t flex justify-between">
                    <button type="button" onclick="pickToday()" class="text-xs text-primary-600 hover:underline font-medium">Hôm nay</button>
                    <button type="button" onclick="toggleCalendar()" class="text-xs text-gray-500 hover:underline">Đóng</button>
                </div>
            </div>
        </div>

        <!-- Customer info with auto-fill + Smart Form -->
        <div class="relative">
            <label class="block text-sm font-medium text-gray-700 mb-1">SĐT khách hàng</label>
            <div class="relative">
                <input type="text" name="customer_phone" id="customer_phone"
                    class="w-full px-3 py-2 pr-8 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500"
                    hx-get="/api/search-customer"
                    hx-trigger="input changed delay:500ms"
                    hx-target="#customer-dropdown"
                    hx-swap="innerHTML"
                    hx-indicator="#cust-spinner"
                    oninput="this.value=this.value.replace(/\s/g,''); if(!this._filling) loadCustomerHistory(this.value)"
                    onblur="setTimeout(()=>{ document.getElementById('customer-dropdown').innerHTML = ''; }, 200)">
                <span id="cust-spinner" class="htmx-indicator absolute right-3 top-2.5">
                    <svg class="animate-spin h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </span>
            </div>
            <div id="customer-dropdown"></div>
            <div id="customer-history"></div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tên khách hàng</label>
            <input type="text" name="customer_name" id="customer_name"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500"
               >
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ</label>
            <textarea name="customer_address" id="customer_address" rows="2"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500"
               ></textarea>
        </div>

        <!-- Product -->
        <div class="border-t pt-4">
            <div class="flex items-center justify-between mb-3">
                <h4 class="font-medium text-gray-800">📦 Sản phẩm</h4>
                <button type="button" onclick="addProductField()"
                    class="px-3 py-1 bg-primary-100 text-primary-700 rounded-lg text-sm hover:bg-primary-200 flex items-center gap-1">
                    <span class="text-lg leading-none">+</span> Thêm sản phẩm
                </button>
            </div>
            <div id="product-fields">
                <div class="product-field mb-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tên sản phẩm</label>
                    <input type="text" name="product_name"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
                </div>
            </div>
        </div>

        <!-- Payment -->
        <div class="border-t pt-4">
            <h4 class="font-medium text-gray-800 mb-3">💰 Thanh toán</h4>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Tổng giá (đ)</label>
                    <input type="text" name="total_price" id="total_price"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500"
                       
                        oninput="formatMoney(this); updateRemaining()">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Tiền cọc (đ)</label>
                    <input type="text" name="deposit" id="deposit"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500"
                       
                        oninput="formatMoney(this); updateRemaining()">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Còn lại (đ) <span class="text-gray-400">— tự động</span></label>
                    <input type="text" name="remaining_display" id="remaining"
                        class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-100 text-gray-600 cursor-not-allowed"
                        readonly tabindex="-1">
                </div>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>
            <input type="text" name="note"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500"
               >
        </div>

        <div id="form-result"></div>

        <button type="submit" id="submit-btn"
            class="w-full py-3 bg-primary-600 text-white rounded-xl font-medium hover:bg-primary-700 transition-colors flex items-center justify-center gap-2">
            💾 Tạo đơn hàng
            <span class="text-xs opacity-60">(Ctrl+S)</span>
        </button>
    </form>
</div>

<script>
    // === Keyboard Shortcuts ===
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 's') {
            e.preventDefault();
            document.getElementById('order-form').requestSubmit();
        }
        if (e.ctrlKey && e.shiftKey && e.key === 'N') {
            e.preventDefault();
            resetForm();
        }
        if (e.key === 'Escape') {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
                document.activeElement.blur();
            }
            hideCalendar();
        }
    });

    // Close calendar when clicking outside
    document.addEventListener('click', function(e) {
        const popup = document.getElementById('calendar-popup');
        const input = document.getElementById('order_date');
        if (popup && !popup.contains(e.target) && e.target !== input) {
            hideCalendar();
        }
    });

    function resetForm() {
        document.getElementById('order-form').reset();
        document.getElementById('customer-history').innerHTML = '';
        initDate();
    }

    // === Calendar Picker ===
    let calMonth, calYear;

    function initDate() {
        const now = new Date();
        calMonth = now.getMonth();
        calYear = now.getFullYear();
        const dd = String(now.getDate()).padStart(2, '0');
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        document.getElementById('order_date').value = dd + '/' + mm;
        renderCalendar();
    }

    function toggleCalendar() {
        const popup = document.getElementById('calendar-popup');
        if (popup.classList.contains('hidden')) {
            popup.classList.remove('hidden');
            renderCalendar();
        } else {
            hideCalendar();
        }
    }

    function hideCalendar() {
        document.getElementById('calendar-popup').classList.add('hidden');
    }

    function calNav(dir) {
        calMonth += dir;
        if (calMonth > 11) { calMonth = 0; calYear++; }
        if (calMonth < 0) { calMonth = 11; calYear--; }
        renderCalendar();
    }

    function pickToday() {
        const now = new Date();
        calMonth = now.getMonth();
        calYear = now.getFullYear();
        selectDate(now.getDate());
    }

    function selectDate(day) {
        const dd = String(day).padStart(2, '0');
        const mm = String(calMonth + 1).padStart(2, '0');
        document.getElementById('order_date').value = dd + '/' + mm;
        hideCalendar();
    }

    function renderCalendar() {
        const months = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6',
                        'Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
        document.getElementById('cal-title').textContent = months[calMonth] + ' ' + calYear;

        const grid = document.getElementById('cal-grid');
        grid.innerHTML = '';

        const firstDay = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        const today = new Date();
        const isCurrentMonth = today.getMonth() === calMonth && today.getFullYear() === calYear;
        const currentVal = document.getElementById('order_date').value;
        let selectedDay = 0;
        if (currentVal) {
            const parts = currentVal.split('/');
            if (parts.length === 2) selectedDay = parseInt(parts[0]);
        }

        // Empty cells before first day
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = 'py-1';
            grid.appendChild(empty);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = d;
            btn.className = 'py-1.5 text-sm rounded-lg transition-colors ';

            if (isCurrentMonth && d === today.getDate()) {
                btn.className += 'font-bold ring-1 ring-primary-400 ';
            }
            if (d === selectedDay) {
                btn.className += 'bg-primary-600 text-white font-medium';
            } else {
                btn.className += 'hover:bg-primary-50 text-gray-700';
            }

            btn.onclick = function() { selectDate(d); };
            grid.appendChild(btn);
        }
    }

    // === Smart Form: Customer History ===
    let historyTimeout = null;
    function loadCustomerHistory(phone) {
        clearTimeout(historyTimeout);
        const el = document.getElementById('customer-history');
        if (!phone || phone.length < 3) {
            el.innerHTML = '';
            return;
        }
        historyTimeout = setTimeout(async () => {
            try {
                const resp = await fetch(`/api/customer-history?phone=${encodeURIComponent(phone)}`);
                const html = await resp.text();
                el.innerHTML = html;
            } catch (e) {
                el.innerHTML = '';
            }
        }, 500);
    }

    function formatMoney(input) {
        let v = input.value.replace(/[^\d]/g, '');
        if (v) {
            input.value = Number(v).toLocaleString('vi-VN');
        }
        updateRemaining();
    }

    function updateRemaining() {
        const price = parseInt(document.getElementById('total_price').value.replace(/[^\d]/g, '')) || 0;
        const deposit = parseInt(document.getElementById('deposit').value.replace(/[^\d]/g, '')) || 0;
        const remaining = price - deposit;
        document.getElementById('remaining').value = remaining > 0 ? remaining.toLocaleString('vi-VN') : '0';
    }

    // === Multi-product fields ===
    function addProductField() {
        const container = document.getElementById('product-fields');
        const div = document.createElement('div');
        div.className = 'product-field mb-2 flex gap-2 items-end';
        div.innerHTML = `
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">Tên sản phẩm</label>
                <input type="text" name="product_name"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>
            <button type="button" onclick="removeProductField(this)"
                class="mb-0.5 p-2 text-red-500 hover:bg-red-50 rounded-lg" title="Xóa">
                ✕
            </button>
        `;
        container.appendChild(div);
        div.querySelector('input').focus();
    }

    function removeProductField(btn) {
        const field = btn.closest('.product-field');
        const container = document.getElementById('product-fields');
        if (container.children.length > 1) {
            field.remove();
        }
    }

    // Init on load
    document.addEventListener('DOMContentLoaded', function() {
        initDate();
    });

    // Sheet type radio styling
    document.querySelectorAll('.sheet-radio').forEach(label => {
        const radio = label.querySelector('input[type="radio"]');
        radio.addEventListener('change', () => {
            document.querySelectorAll('.sheet-radio').forEach(l => {
                l.classList.remove('border-primary-500', 'bg-primary-50', 'border-purple-500', 'bg-purple-50');
                l.classList.add('border-gray-200');
            });
            if (radio.value === 'DON') {
                label.classList.remove('border-gray-200');
                label.classList.add('border-primary-500', 'bg-primary-50');
            } else {
                label.classList.remove('border-gray-200');
                label.classList.add('border-purple-500', 'bg-purple-50');
            }
        });
    });
</script>
{% endblock %}
